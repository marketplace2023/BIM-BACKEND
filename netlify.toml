[build]
  command = "npm run build"
  publish = "netlify-static"
  functions = "netlify/functions"

[functions]
  included_files = ["dist/**", "uploads/**"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api/uploads/:splat"
  status = 200
